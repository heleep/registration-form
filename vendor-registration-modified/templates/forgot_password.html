<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITCG - Forgot Password</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        .forgot-box {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            overflow: hidden;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .form-container {
            padding: 30px 30px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 12px 12px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }

        .form-group i {
            position: absolute;
            left: 15px;
            top: 43px;
            color: #999;
            font-size: 18px;
        }

        .otp-group {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .otp-group.show {
            display: block;
        }

        .otp-input {
            letter-spacing: 8px;
            font-size: 24px !important;
            text-align: center;
            font-weight: bold;
        }

        .password-group {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .password-group.show {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102,126,234,0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .timer {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-top: 15px;
            display: none;
        }

        .timer.show {
            display: block;
        }

        .links {
            text-align: center;
            margin-top: 20px;
        }

        .links a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            margin: 0 10px;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease;
            font-size: 14px;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .loader {
            display: none;
            width: 18px;
            height: 18px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: white;
            font-size: 13px;
        }

        .footer a {
            color: white;
            text-decoration: none;
            opacity: 0.9;
        }

        .footer a:hover {
            opacity: 1;
            text-decoration: underline;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="forgot-box">
            <div class="header">
                <h1>Reset Password</h1>
                <p>We'll send you an OTP to reset your password</p>
            </div>

            <div class="form-container">
                <div class="alert alert-error" id="errorAlert"></div>
                <div class="alert alert-success" id="successAlert"></div>
                <div class="alert alert-info" id="infoAlert"></div>

                <form id="forgotForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" name="email" placeholder="Enter your registered email" required>
                    </div>

                    <div class="form-group otp-group" id="otpSection">
                        <label for="otp">Enter OTP</label>
                        <i class="fas fa-key"></i>
                        <input type="text" id="otp" name="otp" placeholder="000000" maxlength="6" class="otp-input" pattern="\d*" inputmode="numeric">
                    </div>

                    <div class="form-group password-group" id="passwordSection">
                        <label for="newPassword">New Password</label>
                        <i class="fas fa-lock"></i>
                        <input type="password" id="newPassword" name="newPassword" placeholder="Enter new password">
                    </div>

                    <div class="form-group password-group" id="confirmPasswordSection">
                        <label for="confirmPassword">Confirm Password</label>
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm new password">
                    </div>

                    <div class="timer" id="timer">
                        <i class="fas fa-clock"></i> OTP expires in <span id="timerValue">10:00</span>
                    </div>

                    <button type="button" class="btn btn-primary" id="sendOtpBtn" onclick="sendOTP()">
                        <span id="sendOtpText">Send OTP</span>
                        <div class="loader" id="sendOtpLoader"></div>
                    </button>

                    <button type="button" class="btn btn-primary" id="verifyOtpBtn" style="display: none;" onclick="verifyOTP()">
                        <span id="verifyOtpText">Verify OTP</span>
                        <div class="loader" id="verifyOtpLoader"></div>
                    </button>

                    <button type="button" class="btn btn-primary" id="resetPasswordBtn" style="display: none;" onclick="resetPassword()">
                        <span id="resetPasswordText">Reset Password</span>
                        <div class="loader" id="resetPasswordLoader"></div>
                    </button>

                    <button type="button" class="btn btn-secondary" id="backBtn" style="display: none;" onclick="resetToEmail()">
                        <i class="fas fa-arrow-left"></i> Back
                    </button>
                </form>

                <div class="links">
                    <a href="/login">Back to Login</a>
                    <a href="/signup">Create Account</a>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>&copy; 2026 ITCG. All rights reserved. | <a href="#">Privacy Policy</a> | <a href="#">Terms of Service</a></p>
        </div>
    </div>

    <script>
        let timerInterval;
        let timeLeft = 600;
        let currentStep = 'email';

        function showError(message) {
            const alert = document.getElementById('errorAlert');
            alert.textContent = message;
            alert.classList.add('show');
            setTimeout(() => alert.classList.remove('show'), 5000);
        }

        function showSuccess(message) {
            const alert = document.getElementById('successAlert');
            alert.textContent = message;
            alert.classList.add('show');
            setTimeout(() => alert.classList.remove('show'), 5000);
        }

        function showInfo(message) {
            const alert = document.getElementById('infoAlert');
            alert.textContent = message;
            alert.classList.add('show');
            setTimeout(() => alert.classList.remove('show'), 5000);
        }

        function setLoading(buttonId, loaderId, textId, isLoading) {
            const btn = document.getElementById(buttonId);
            const loader = document.getElementById(loaderId);
            const text = document.getElementById(textId);
            
            if (isLoading) {
                btn.disabled = true;
                loader.style.display = 'inline-block';
                text.style.opacity = '0.7';
            } else {
                btn.disabled = false;
                loader.style.display = 'none';
                text.style.opacity = '1';
            }
        }

        function startTimer() {
            const timer = document.getElementById('timer');
            const timerValue = document.getElementById('timerValue');
            timer.classList.add('show');
            
            timeLeft = 600;
            
            if (timerInterval) {
                clearInterval(timerInterval);
            }
            
            timerInterval = setInterval(() => {
                timeLeft--;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timer.classList.remove('show');
                    resetToEmail();
                    showError('OTP expired. Please request a new one.');
                    return;
                }
                
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                timerValue.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function resetToEmail() {
            currentStep = 'email';
            document.getElementById('otpSection').classList.remove('show');
            document.getElementById('passwordSection').classList.remove('show');
            document.getElementById('confirmPasswordSection').classList.remove('show');
            document.getElementById('sendOtpBtn').style.display = 'block';
            document.getElementById('verifyOtpBtn').style.display = 'none';
            document.getElementById('resetPasswordBtn').style.display = 'none';
            document.getElementById('backBtn').style.display = 'none';
            document.getElementById('timer').classList.remove('show');
            document.getElementById('otp').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
            
            if (timerInterval) {
                clearInterval(timerInterval);
            }
        }

        async function sendOTP() {
            const email = document.getElementById('email').value;
            
            if (!email || !email.includes('@')) {
                showError('Please enter a valid email address');
                return;
            }

            setLoading('sendOtpBtn', 'sendOtpLoader', 'sendOtpText', true);

            try {
                const response = await fetch('/api/send-otp', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        email: email,
                        purpose: 'reset'
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showSuccess('OTP sent to your email!');
                    currentStep = 'otp';
                    document.getElementById('otpSection').classList.add('show');
                    document.getElementById('sendOtpBtn').style.display = 'none';
                    document.getElementById('verifyOtpBtn').style.display = 'block';
                    document.getElementById('backBtn').style.display = 'block';
                    startTimer();
                } else {
                    showError(data.error || 'Failed to send OTP');
                }
            } catch (error) {
                showError('Network error. Please try again.');
            } finally {
                setLoading('sendOtpBtn', 'sendOtpLoader', 'sendOtpText', false);
            }
        }

        async function verifyOTP() {
            const email = document.getElementById('email').value;
            const otp = document.getElementById('otp').value;

            if (!otp || otp.length !== 6) {
                showError('Please enter a valid 6-digit OTP');
                return;
            }

            setLoading('verifyOtpBtn', 'verifyOtpLoader', 'verifyOtpText', true);

            try {
                const response = await fetch('/api/verify-otp', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        email: email,
                        otp: otp,
                        purpose: 'reset'
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showSuccess('OTP verified! Please set your new password.');
                    currentStep = 'password';
                    document.getElementById('otpSection').classList.remove('show');
                    document.getElementById('passwordSection').classList.add('show');
                    document.getElementById('confirmPasswordSection').classList.add('show');
                    document.getElementById('verifyOtpBtn').style.display = 'none';
                    document.getElementById('resetPasswordBtn').style.display = 'block';
                } else {
                    showError(data.error || 'Invalid OTP');
                }
            } catch (error) {
                showError('Network error. Please try again.');
            } finally {
                setLoading('verifyOtpBtn', 'verifyOtpLoader', 'verifyOtpText', false);
            }
        }

        async function resetPassword() {
            const email = document.getElementById('email').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!newPassword) {
                showError('Please enter a new password');
                return;
            }

            if (newPassword !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }

            if (newPassword.length < 6) {
                showError('Password must be at least 6 characters long');
                return;
            }

            setLoading('resetPasswordBtn', 'resetPasswordLoader', 'resetPasswordText', true);

            try {
                const response = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        email: email,
                        new_password: newPassword
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showSuccess('Password reset successfully! Redirecting to login...');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    showError(data.error || 'Failed to reset password');
                }
            } catch (error) {
                showError('Network error. Please try again.');
            } finally {
                setLoading('resetPasswordBtn', 'resetPasswordLoader', 'resetPasswordText', false);
            }
        }

        // Enter key handling
        document.getElementById('otp').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && currentStep === 'otp') {
                verifyOTP();
            }
        });

        document.getElementById('newPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && currentStep === 'password') {
                resetPassword();
            }
        });

        document.getElementById('confirmPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && currentStep === 'password') {
                resetPassword();
            }
        });

        // Auto-focus OTP field
        const observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
                if (mutation.target.classList.contains('show')) {
                    if (mutation.target.id === 'otpSection') {
                        document.getElementById('otp').focus();
                    } else if (mutation.target.id === 'passwordSection') {
                        document.getElementById('newPassword').focus();
                    }
                }
            });
        });

        observer.observe(document.getElementById('otpSection'), { attributes: true, attributeFilter: ['class'] });
        observer.observe(document.getElementById('passwordSection'), { attributes: true, attributeFilter: ['class'] });
    </script>
</body>
</html>
